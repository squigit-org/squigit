schema = 2

[context]
kind = "component"
name = "squigit-stt"
display_name = "Squigit STT"
category = "crates"
order = 80

[requirements]
node = false
rust = true
python = false
cmake = false
qt = false

[version]
scheme = "semver"
files = ["Cargo.toml"]
include_root = true
source = { path = "Cargo.toml", format = "toml", key = "package.version" }

[tests]
root = "tests"
include = ["tests/*.rs", "tests/**/*.rs"]

[operations]
dev = { enabled = false, handler = "none", description = "Development mode is not enabled." }
doctor = { enabled = true, handler = "cargo-crate", description = "Cargo Check this Crate" }
build = { enabled = true, handler = "cargo-crate", requires_commit_sha = false, description = "Build Squigit STT" }
test = { enabled = true, handler = "cargo-crate", description = "Run Crate test suites" }
clean = { enabled = true, handler = "cargo-crate", description = "Remove Build artifacts" }
bump = { enabled = true, handler = "cargo-crate", description = "Prepare a SemVer update" }
release = { enabled = false, handler = "none", description = "Release is not enabled." }

[ui.menu]
title = "Squigit STT xtask"
usage = "cargo xtask <command> [options]"

