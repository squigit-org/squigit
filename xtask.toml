schema = 2

[context]
kind = "repository"
name = "Squigit"
temp_namespace = "squigit-xtask"

[discovery]
roots = ["apps", "crates", "sidecars"]

[version]
scheme = "calver"
files = ["VERSION", "CHANGELOG.md"]
include_root = false
source = { path = "VERSION", format = "plain" }

[operations]
dev = { enabled = true, handler = "component", description = "Start a component locally" }
doctor = { enabled = true, handler = "doctor", description = "Check the environment" }
build = { enabled = true, handler = "component", description = "Build project components" }
test = { enabled = true, handler = "workspace", description = "Run workspace test suites" }
clean = { enabled = true, handler = "workspace", description = "Remove build artifacts" }
bump = { enabled = true, handler = "root-bump", description = "Prepare version updates" }
release = { enabled = true, handler = "component", description = "Run the release workflow" }
live = { enabled = true, handler = "live", description = "Run isolated workflows" }
crypto = { enabled = true, handler = "crypto", description = "Sign OTA update artifacts" }

[ui.vocabulary]
usage = "Usage:"
requires = "Requires:"
commands = "Commands:"

[ui.menu]
title = "Squigit xtask"
usage = "cargo xtask <command> [path/to/component] [options]"

[ui.screens.dev]
title = "Squigit Dev"
usage = "cargo xtask dev [relative/path/to/component]"
description = "Start a component in development mode."

[ui.screens.build]
title = "Squigit Build"
usage = "cargo xtask build [target] [options]"

[ui.screens.build.section]
title = "Targets:"
entries = [
    { label = "path/to/", description = "Build a component at path" },
    { label = "Desktop", description = "Build the Desktop installer" },
    { label = "CLI", description = "Build the CLI application" },
    { label = "OCR", description = "Build the OCR OS Package" },
    { label = "STT", description = "Build the STT OS Package" },
]

[ui.screens.release]
title = "Squigit Release"
usage = "cargo xtask release [target]"

[ui.screens.release.section]
title = "Targets:"
entries = [
    { label = "Renderer", description = "Tag the Renderer release" },
    { label = "Squigit", description = "Tag the desktop release" },
    { label = "OCR", description = "Tag the OCR package release" },
    { label = "STT", description = "Tag the STT package release" },
    { label = "CLI", description = "Tag the CLI package release" },
]

[ui.screens.live]
title = "Squigit Live"
usage = "cargo xtask live [workflow] [options]"

[ui.screens.live.section]
title = "Workflows:"
entries = [
    { label = "auth", description = "Login, signup, logout, list, or remove isolated profiles" },
    { label = "brain", description = "Analyze images, send a prompt, or continue isolated threads" },
    { label = "ocr", description = "Run OCR, download models, or list the temporary model cache" },
    { label = "capture", description = "Run smoke tests in both: traditional, or squiggle captures" },
]

[ui.screens."live.auth"]
title = "Live auth"
usage = "cargo xtask live auth [operation] [options]"

[ui.screens."live.auth".section]
title = "Operations:"
entries = [
    { label = "login", description = "Login with an account already saved in temporary profiles" },
    { label = "signup", description = "Add a new Google account to temporary profiles" },
    { label = "logout", description = "Clear the active session while preserving temporary profiles" },
    { label = "profiles", description = "List temporary profile IDs, emails, names, and status" },
    { label = "remove", description = "Remove an inactive temporary profile using its id or email" },
]

[ui.screens."live.brain"]
title = "Live brain"
usage = "cargo xtask live brain [operation] [options]"
requirements = [
    { text = "GEMINI_API_KEY (required for analyze and prompt)", link = { label = "aistudio.google.com/app/api-keys", url = "https://aistudio.google.com/app/api-keys" } },
]

[ui.screens."live.brain".section]
title = "Operations:"
entries = [
    { label = "analyze", description = "Start an isolated thread with <path/to/image> [message...]" },
    { label = "prompt", description = "Continue an isolated thread using <thread-id> <message...>" },
    { label = "threads", description = "List your isolated threads IDs, titles, and creation dates" },
]

[ui.screens."live.ocr"]
title = "Live OCR"
usage = "cargo xtask live ocr [operation] [options]"

[ui.screens."live.ocr".section]
title = "Operations:"
entries = [
    { label = "analyze", description = "Extract text from [IMAGE] using [MODEL]" },
    { label = "download", description = "Download isolated PaddleOCR models" },
    { label = "models", description = "List your isolated model IDs and names" },
]

[ui.screens."live.capture"]
title = "Live capture"
usage = "cargo xtask live capture [mode]"

[ui.screens."live.capture".section]
title = "Modes:"
entries = [
    { label = "traditional", description = "Capture your screen using a selection box" },
    { label = "squiggle", description = "Grab the area you scribble using a brush" },
]

[ui.screens.crypto]
title = "Squigit crypto"
usage = "cargo xtask crypto [operation] [options]"

[ui.screens.crypto.section]
title = "Operations:"
entries = [
    { label = "keygen", description = "Generate an Ed25519 signing pair" },
    { label = "sign", description = "Sign an OTA update artifact" },
]

[ui.screens."crypto.sign"]
title = "Crypto sign"
usage = "cargo xtask crypto sign <artifact.zip>"
requirements = [
    { text = "Bash: export SQUIGIT_OTA_PRIVATE_KEY_PEM=\"$(cat priv.pem)\"" },
    { text = "PowerShell: $env:SQUIGIT_OTA_PRIVATE_KEY_PEM = Get-Content priv.pem -Raw" },
    { text = "GitHub Actions: SQUIGIT_OTA_PRIVATE_KEY_PEM: ${{ secrets.SQUIGIT_OTA_PRIVATE_KEY_PEM }}" },
]
description = "Sign an OTA update artifact. In CI, expose the multiline PEM secret only for the signing step."

[ui.prompts."crypto.keygen"]
title = "Crypto keygen"
question = "Generate a new Ed25519 signing key pair? [y/N]"
declined = "Key generation cancelled."
