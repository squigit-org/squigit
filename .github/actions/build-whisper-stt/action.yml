name: "Build Whisper STT CLI"
description: "Builds the C++ Whisper STT standalone executable"
inputs:
  python-version:
    description: "Python version used to download Whisper models"
    required: false
    default: "3.13"
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2

    - name: Download Whisper Models
      shell: bash
      run: |
        python sidecars/whisper-stt/download_models.py --clean-stale

    - name: Build Whisper STT
      shell: bash
      run: |
        cargo xtask build stt
