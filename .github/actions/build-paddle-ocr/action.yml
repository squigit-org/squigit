name: "Build PaddleOCR CLI"
description: "Builds the Python-based PaddleOCR standalone executable"
inputs:
  python-version:
    description: "Python version used to build the OCR sidecar"
    required: false
    default: "3.13"
  pyi-mode:
    description: "PyInstaller mode: onedir (default) or onefile (baseline measurement)"
    required: false
    default: "onedir"
  package-windows-asset:
    description: "When true on Windows, zip the packaged runtime dir and expose asset outputs"
    required: false
    default: "false"
  windows-runtime-dir:
    description: "Runtime directory to zip when package-windows-asset=true"
    required: false
    default: "packaging/binaries/paddle-ocr-x86_64-pc-windows-msvc"
  windows-asset-name:
    description: "ZIP filename to produce when package-windows-asset=true"
    required: false
    default: "squigit-ocr-win-x64.zip"
outputs:
  asset-path:
    description: "Absolute path to generated Windows ZIP asset"
    value: ${{ steps.package-windows.outputs.asset_path }}
  asset-name:
    description: "Generated Windows ZIP filename"
    value: ${{ steps.package-windows.outputs.asset_name }}
  asset-sha256:
    description: "SHA256 of generated Windows ZIP asset"
    value: ${{ steps.package-windows.outputs.asset_sha256 }}
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Build PaddleOCR CLI
      shell: bash
      env:
        SQUIGIT_OCR_PYI_MODE: ${{ inputs.pyi-mode }}
      run: |
        cargo xtask build ocr

    - name: Package Windows OCR Asset
      if: runner.os == 'Windows' && inputs.package-windows-asset == 'true'
      id: package-windows
      shell: pwsh
      env:
        RUNTIME_DIR: ${{ inputs.windows-runtime-dir }}
        ASSET_NAME: ${{ inputs.windows-asset-name }}
      run: |
        $ErrorActionPreference = "Stop"

        if (-not (Test-Path -LiteralPath $env:RUNTIME_DIR)) {
          throw "Windows runtime directory not found: $env:RUNTIME_DIR"
        }

        $runtimeDir = (Resolve-Path -LiteralPath $env:RUNTIME_DIR).Path
        $assetDir = Join-Path $env:RUNNER_TEMP "winget-assets"
        New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

        $assetPath = Join-Path $assetDir $env:ASSET_NAME
        if (Test-Path -LiteralPath $assetPath) {
          Remove-Item -LiteralPath $assetPath -Force
        }

        Compress-Archive -Path (Join-Path $runtimeDir "*") -DestinationPath $assetPath -Force
        $sha = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()

        "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
        "asset_name=$env:ASSET_NAME" >> $env:GITHUB_OUTPUT
        "asset_sha256=$sha" >> $env:GITHUB_OUTPUT
