name: "Distribute"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-capture:
    name: Build Capture Engine ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: macOS-ARM
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Cache Capture Engine
        id: cache-capture
        uses: actions/cache@v5
        with:
          path: apps/desktop/binaries/qt-capture-${{ matrix.target }}
          key: capture-engine-${{ matrix.target }}-${{ hashFiles('.github/actions/build-capture-engine/**', 'sidecars/qt-capture/**', 'sidecars/capture/**', 'crates/**', 'xtask/**', 'Cargo.lock') }}

      - name: Build Capture Sidecar
        if: steps.cache-capture.outputs.cache-hit != 'true'
        uses: ./.github/actions/build-qt-capture
        with:
          target: ${{ matrix.target }}

      - name: Package for artifact upload (Unix)
        if: runner.os != 'Windows'
        run: tar -cvzf capture-sidecar.tar.gz -C apps/desktop/binaries qt-capture-${{ matrix.target }}

      - name: Upload Capture Sidecar
        uses: actions/upload-artifact@v7
        with:
          name: qt-capture-${{ matrix.target }}
          path: |
            capture-sidecar.tar.gz
            apps/desktop/binaries/qt-capture-${{ matrix.target }}/

  build-tauri:
    name: Build Desktop ${{ matrix.name }}
    needs: build-capture
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: macOS-ARM
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/renderer/package-lock.json

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libayatana-appindicator3-1 \
            librsvg2-dev \
            libasound2-dev \
            appstream \
            desktop-file-utils \
            squashfs-tools \
            zsync \
            patchelf \
            libxdo3

          # ubuntu-latest can change (22.04/24.04). AppImage runtime needs libfuse.so.2.
          # Try the current package name first, then the legacy one.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Download Capture Sidecar
        uses: actions/download-artifact@v8
        with:
          name: qt-capture-${{ matrix.target }}
          path: apps/desktop/binaries/qt-capture-${{ matrix.target }}/

      - name: Unpack sidecar symlinks (Unix)
        if: runner.os != 'Windows'
        run: |
          cd apps/desktop/binaries
          tar -xvzf qt-capture-${{ matrix.target }}/capture-sidecar.tar.gz
          rm qt-capture-${{ matrix.target }}/capture-sidecar.tar.gz

      - name: Inject Credentials
        shell: bash
        env:
          CREDENTIALS_JSON: ${{ secrets['CREDENTIALS_JSON'] || '' }}
        run: |
          if [ -n "$CREDENTIALS_JSON" ]; then
            echo "$CREDENTIALS_JSON" > apps/desktop/src/data/credentials.json
          else
            echo "CREDENTIALS_JSON secret is not set! Using example file."
            cp apps/desktop/src/data/credentials.example.json apps/desktop/src/data/credentials.json
          fi

      - name: Build Tauri Desktop
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
          SQUIGIT_TAURI_DEBUG: "1"
        run: |
          echo "Build debug flags:"
          echo "  APPIMAGE_EXTRACT_AND_RUN=${APPIMAGE_EXTRACT_AND_RUN}"
          echo "  NO_STRIP=${NO_STRIP}"
          echo "  SQUIGIT_TAURI_DEBUG=${SQUIGIT_TAURI_DEBUG}"
          cargo xtask build desktop

      - name: Linux bundling diagnostics (always)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "== Runner OS =="
          uname -a
          cat /etc/os-release || true

          echo "== Tool availability =="
          command -v appstreamcli || true
          command -v desktop-file-validate || true
          command -v mksquashfs || true
          command -v zsyncmake || true
          command -v patchelf || true

          echo "== Tool versions =="
          appstreamcli --version || true
          desktop-file-validate --version || true
          mksquashfs -version || true
          zsyncmake --version || true
          patchelf --version || true

      - name: Linux bundling diagnostics (on failure)
        if: failure() && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "== AppImage bundle directory =="
          find "$PWD/target/release/bundle" -type f 2>/dev/null | sort || true

          echo "== AppImage AppDir tree =="
          find "$PWD/target/release/bundle/appimage" -maxdepth 8 -print 2>/dev/null | sort || true

          echo "== Disk space =="
          df -h || true

          echo "== Recent linuxdeploy/appimage traces in workspace =="
          grep -RInE "linuxdeploy|appimage|AppImage|failed to run linuxdeploy|mksquashfs|desktop-file-validate|appstream" "$PWD" 2>/dev/null | head -n 300 || true

      - name: Collect Linux Artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APPIMAGE_PATH="$(find "$PWD" -type f -path "*/bundle/appimage/*.AppImage" | head -n 1)"
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "AppImage not found"
            exit 1
          fi
          cp "$APPIMAGE_PATH" dist/squigit.appimage

      - name: Collect Windows Artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $nsis = Get-ChildItem -Path "$PWD/target/release/bundle/nsis" -Filter "*-setup.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) {
            Copy-Item $nsis.FullName dist/
          } else {
            throw "NSIS setup.exe not found under target/release/bundle/nsis"
          }

      - name: Collect macOS Artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          DMG_PATH="$(find "$PWD/target/release/bundle" -name '*.dmg' -type f 2>/dev/null | head -n 1)"
          if [ -n "$DMG_PATH" ]; then
            cp "$DMG_PATH" dist/
          else
            echo "No .dmg bundle found under target/release/bundle"
            exit 1
          fi

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v7
        with:
          name: squigit-${{ matrix.target }}
          path: dist/*
