name: "Distribute"

on:
  # push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------------
  # Job 1: Build Capture Engine (Qt + Rust)
  # -----------------------------------------------------------------------------
  build-capture:
    name: Capture ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: macOS-ARM
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Build Capture Engine
        uses: ./.github/actions/build-capture-engine
        with:
          target: ${{ matrix.target }}

      - name: Prepare Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-staging/qt-capture-${{ matrix.target }}/_internal
          cp -r apps/desktop/binaries/qt-capture-${{ matrix.target }}/_internal/* dist-staging/qt-capture-${{ matrix.target }}/_internal/
          cp apps/desktop/binaries/qt-capture-${{ matrix.target }}/capture-engine dist-staging/qt-capture-${{ matrix.target }}/

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-staging/qt-capture-${{ matrix.target }}/_internal -Force
          Copy-Item -Recurse apps/desktop/binaries/qt-capture-${{ matrix.target }}/_internal/* dist-staging/qt-capture-${{ matrix.target }}/_internal/
          Copy-Item apps/desktop/binaries/qt-capture-${{ matrix.target }}/capture-engine.exe dist-staging/qt-capture-${{ matrix.target }}/

      - name: Upload Capture Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capture-engine-${{ matrix.target }}
          path: dist-staging/*

  # -----------------------------------------------------------------------------
  # Job 2: Build OCR Engine (Python/PyInstaller)
  # -----------------------------------------------------------------------------
  build-ocr:
    name: OCR ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: macOS-ARM
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Build OCR Engine
        uses: ./.github/actions/build-ocr-engine
        with:
          python-version: "3.13"

      - name: Prepare Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-staging/paddle-ocr-${{ matrix.target }}
          cp -r apps/desktop/binaries/paddle-ocr-${{ matrix.target }}/* dist-staging/paddle-ocr-${{ matrix.target }}/

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-staging/paddle-ocr-${{ matrix.target }} -Force
          Copy-Item -Recurse apps/desktop/binaries/paddle-ocr-${{ matrix.target }}/* dist-staging/paddle-ocr-${{ matrix.target }}/

      - name: Upload OCR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocr-engine-${{ matrix.target }}
          path: dist-staging/*

  # -----------------------------------------------------------------------------
  # Job 3: Package & Release
  # -----------------------------------------------------------------------------
  package:
    name: Package & Release
    needs: [build-capture, build-ocr]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
          - aarch64-apple-darwin

    steps:
      - name: Download Capture Artifacts
        uses: actions/download-artifact@v4
        with:
          name: capture-engine-${{ matrix.target }}
          path: staging/capture

      - name: Download OCR Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ocr-engine-${{ matrix.target }}
          path: staging/ocr

      - name: Assemble & Zip
        run: |
          mkdir -p final/sidecars

          if [ -d staging/capture/qt-capture-${{ matrix.target }} ]; then
            cp -r staging/capture/qt-capture-${{ matrix.target }} final/sidecars/
          else
            echo "Missing capture artifact for ${{ matrix.target }}"
            exit 1
          fi

          if [ -d staging/ocr/paddle-ocr-${{ matrix.target }} ]; then
            cp -r staging/ocr/paddle-ocr-${{ matrix.target }} final/sidecars/
          else
            echo "Missing OCR artifact for ${{ matrix.target }}"
            exit 1
          fi

          cd final
          zip -r ../sidecars-${{ matrix.target }}.zip sidecars

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: sidecars-${{ matrix.target }}.zip
