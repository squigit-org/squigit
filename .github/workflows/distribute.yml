name: "Distribute"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-package:
    name: Build + Bundle ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: Windows-x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: macOS-ARM
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/renderer/package-lock.json

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

          # ubuntu-latest can change (22.04/24.04). AppImage runtime needs libfuse.so.2.
          # Try the current package name first, then the legacy one.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Build Capture Sidecar
        uses: ./.github/actions/build-capture-engine
        with:
          target: ${{ matrix.target }}

      # - name: Build OCR Sidecar
      #   uses: ./.github/actions/build-ocr-engine
      #   with:
      #     python-version: "3.12"

      # - name: Build Whisper Sidecar
      #   uses: ./.github/actions/build-whisper-engine
      #   with:
      #     python-version: "3.13"

      - name: Re-sign sidecars (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          IDENTITY="-"

          find "apps/desktop/binaries" -type f \( -name "*.dylib" -o -name "capture-engine" -o -name "whisper-stt" -o -name "ocr-engine" \) -print0 | while IFS= read -r -d '' f; do
            codesign --force --options runtime --timestamp=none --sign "$IDENTITY" "$f"
          done

          if [ -d "apps/desktop/binaries/qt-capture-${{ matrix.target }}/_internal/capture.app" ]; then
            codesign --force --deep --options runtime --timestamp=none --sign "$IDENTITY" "apps/desktop/binaries/qt-capture-${{ matrix.target }}/_internal/capture.app"
          fi

      - name: Upload Capture Sidecar
        uses: actions/upload-artifact@v4
        with:
          name: qt-capture-${{ matrix.target }}
          path: apps/desktop/binaries/qt-capture-${{ matrix.target }}/

      # - name: Upload OCR Sidecar
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: paddle-ocr-${{ matrix.target }}
      #     path: apps/desktop/binaries/paddle-ocr-${{ matrix.target }}/

      # - name: Upload Whisper Sidecar
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: whisper-stt-${{ matrix.target }}
      #     path: apps/desktop/binaries/whisper-stt-${{ matrix.target }}/

      - name: Build Tauri Desktop
        env:
          # linuxdeploy and plugin binaries are AppImages; avoid FUSE runtime issues in CI.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: cargo xtask build desktop

      - name: Collect Linux Artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APPIMAGE_PATH="$(find "$PWD" -type f -path "*/bundle/appimage/*.AppImage" | head -n 1)"
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "AppImage not found"
            exit 1
          fi
          cp "$APPIMAGE_PATH" dist/squigit.appimage

      - name: Collect Windows Artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          $nsis = Get-ChildItem -Path "$PWD/target/release/bundle/nsis" -Filter "*-setup.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) {
            Copy-Item $nsis.FullName dist/
          } else {
            throw "NSIS setup.exe not found under target/release/bundle/nsis"
          }

      - name: Collect macOS Artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          DMG_PATH="$(find "$PWD/target/release/bundle" -name '*.dmg' -type f 2>/dev/null | head -n 1)"
          if [ -n "$DMG_PATH" ]; then
            cp "$DMG_PATH" dist/
          else
            echo "No .dmg bundle found under target/release/bundle"
            exit 1
          fi

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: squigit-${{ matrix.target }}
          path: dist/*
