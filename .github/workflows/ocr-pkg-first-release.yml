name: "OCR Pkg-First Release"

on:
  push:
    tags:
      - "ocr-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "OCR formula version (example: 1.2.0)"
        required: true
        type: string
      release_tag:
        description: "Optional release tag override (example: ocr-v1.2.0). Leave empty to auto-use ocr-v<version>."
        required: false
        default: ""
        type: string
      release_homebrew:
        description: "Run Homebrew lane"
        required: false
        default: true
        type: boolean
      release_winget:
        description: "Run Winget lane (mock)"
        required: false
        default: true
        type: boolean
      release_apt:
        description: "Run APT lane (mock)"
        required: false
        default: true
        type: boolean
      release_dnf:
        description: "Run DNF lane (mock)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-channel-scope:
    name: Resolve Channel Scope
    runs-on: ubuntu-latest
    outputs:
      run_homebrew: ${{ steps.scope.outputs.run_homebrew }}
      run_winget: ${{ steps.scope.outputs.run_winget }}
      run_apt: ${{ steps.scope.outputs.run_apt }}
      run_dnf: ${{ steps.scope.outputs.run_dnf }}
    steps:
      - name: Resolve channels
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            run_homebrew=true
            run_winget=true
            run_apt=true
            run_dnf=true
          else
            run_homebrew="${{ inputs.release_homebrew }}"
            run_winget="${{ inputs.release_winget }}"
            run_apt="${{ inputs.release_apt }}"
            run_dnf="${{ inputs.release_dnf }}"

            if [ "${run_homebrew}" != "true" ] && [ "${run_winget}" != "true" ] && [ "${run_apt}" != "true" ] && [ "${run_dnf}" != "true" ]; then
              echo "At least one channel must be enabled for workflow_dispatch."
              exit 1
            fi
          fi

          echo "run_homebrew=${run_homebrew}" >> "$GITHUB_OUTPUT"
          echo "run_winget=${run_winget}" >> "$GITHUB_OUTPUT"
          echo "run_apt=${run_apt}" >> "$GITHUB_OUTPUT"
          echo "run_dnf=${run_dnf}" >> "$GITHUB_OUTPUT"
          echo "Resolved channels: homebrew=${run_homebrew}, winget=${run_winget}, apt=${run_apt}, dnf=${run_dnf}"

  build-release-ocr:
    name: Build OCR macOS Arm64 + Release Asset
    needs: resolve-channel-scope
    runs-on: macos-14
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      asset_url: ${{ steps.meta.outputs.asset_url }}
      sha256: ${{ steps.meta.outputs.sha256 }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Extract Version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            RELEASE_TAG="${{ inputs.release_tag }}"
            if [ -z "${RELEASE_TAG}" ]; then
              RELEASE_TAG="ocr-v${VERSION}"
            fi
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            VERSION="${RELEASE_TAG#ocr-v}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "Resolved VERSION is empty"
            exit 1
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "Resolved RELEASE_TAG is empty"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build PaddleOCR Sidecar (onefile)
        uses: ./.github/actions/build-paddle-ocr
        with:
          python-version: "3.12"
          pyi-mode: "onefile"

      - name: Generate OCR Smoke Image
        shell: bash
        run: |
          set -euo pipefail
          sidecars/paddle-ocr/venv/bin/python sidecars/paddle-ocr/scripts/gen_test_image.py \
            --output /tmp/ocr-smoke.png \
            --text "SQUIGIT macOS-ARM OCR SMOKE"

      - name: Run Sidecar CLI and Print JSON
        shell: bash
        run: |
          set -euo pipefail
          chmod +x packaging/binaries/paddle-ocr-aarch64-apple-darwin/squigit-ocr || true
          packaging/binaries/paddle-ocr-aarch64-apple-darwin/squigit-ocr /tmp/ocr-smoke.png | tee /tmp/ocr-smoke-output.json

      - name: Validate OCR JSON Payload
        shell: bash
        run: |
          set -euo pipefail
          sidecars/paddle-ocr/venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          out = Path("/tmp/ocr-smoke-output.json")
          payload = json.loads(out.read_text(encoding="utf-8").strip())
          if isinstance(payload, dict) and "error" in payload:
              raise SystemExit(f"OCR returned error: {payload['error']}")
          if not isinstance(payload, list):
              raise SystemExit(f"OCR payload type {type(payload).__name__}, expected list")
          if not payload:
              raise SystemExit("OCR payload list is empty")

          text_values = [str(item.get("text", "")).strip() for item in payload if isinstance(item, dict)]
          merged = " | ".join(t for t in text_values if t)
          upper = merged.upper()
          for token in ("SQUIGIT", "OCR", "CLI", "VALIDATION"):
              if token not in upper:
                  raise SystemExit(f"Expected token '{token}' in OCR text, got: {merged!r}")

          print(f"Detected entries: {len(payload)}")
          print(f"Detected text: {merged}")
          PY

      - name: Create Release Tarball
        shell: bash
        run: |
          set -euo pipefail
          tar -czvf squigit-ocr-mac-aarch64.tar.gz -C packaging/binaries/paddle-ocr-aarch64-apple-darwin .

      - name: Upload OCR Asset to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: OCR v${{ steps.version.outputs.version }}
          files: squigit-ocr-mac-aarch64.tar.gz
          overwrite_files: true
          repository: squigit-org/squigit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Release Metadata
        id: meta
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail
          SHA256="$(shasum -a 256 squigit-ocr-mac-aarch64.tar.gz | awk '{ print $1 }')"
          ASSET_URL="https://github.com/squigit-org/squigit/releases/download/${RELEASE_TAG}/squigit-ocr-mac-aarch64.tar.gz"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"

  update-homebrew-tap-ocr:
    name: Update Homebrew Tap Formula (OCR)
    if: needs.resolve-channel-scope.outputs.run_homebrew == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Sync OCR Formula to Tap
        uses: ./.github/actions/update-homebrew-tap-formula
        with:
          tap-token: ${{ secrets.TAP_GITHUB_TOKEN }}
          tap-repo: squigit-org/homebrew-tap
          version: ${{ needs.build-release-ocr.outputs.version }}
          asset-url: ${{ needs.build-release-ocr.outputs.asset_url }}
          sha256: ${{ needs.build-release-ocr.outputs.sha256 }}
          template-formula-path: ${{ github.workspace }}/packaging/homebrew/squigit-ocr.rb
          formula-file: squigit-ocr.rb
          commit-message: Update squigit-ocr to v${{ needs.build-release-ocr.outputs.version }}

  test-homebrew-ocr:
    name: End-user Homebrew Install Smoke (OCR)
    if: needs.resolve-channel-scope.outputs.run_homebrew == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
      - update-homebrew-tap-ocr
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Smoke Image Dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow

      - name: Tap and Install squigit-ocr
        uses: ./.github/actions/homebrew-install-with-retry
        with:
          tap: squigit-org/tap
          formula: squigit-ocr
          initial-wait-seconds: "60"
          attempts: "6"
          sleep-seconds: "20"
          brew-curl-retries: "5"

      - name: Run Built-in Formula Test
        shell: bash
        run: brew test squigit-ocr

      - name: Generate OCR Smoke Image
        shell: bash
        run: |
          set -euo pipefail
          python3 sidecars/paddle-ocr/scripts/gen_test_image.py \
            --output /tmp/ocr-smoke.png \
            --text "SQUIGIT macOS-ARM OCR SMOKE"

      - name: Run Installed OCR CLI and Print JSON
        shell: bash
        run: |
          set -euo pipefail
          squigit-ocr /tmp/ocr-smoke.png | tee /tmp/ocr-smoke-output.json

      - name: Validate Installed OCR JSON Payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          out = Path("/tmp/ocr-smoke-output.json")
          payload = json.loads(out.read_text(encoding="utf-8").strip())
          if isinstance(payload, dict) and "error" in payload:
              raise SystemExit(f"OCR returned error: {payload['error']}")
          if not isinstance(payload, list):
              raise SystemExit(f"OCR payload type {type(payload).__name__}, expected list")
          if not payload:
              raise SystemExit("OCR payload list is empty")

          text_values = [str(item.get("text", "")).strip() for item in payload if isinstance(item, dict)]
          merged = " | ".join(t for t in text_values if t)
          upper = merged.upper()
          for token in ("SQUIGIT", "OCR", "CLI", "VALIDATION"):
              if token not in upper:
                  raise SystemExit(f"Expected token '{token}' in OCR text, got: {merged!r}")

          print(f"Detected entries: {len(payload)}")
          print(f"Detected text: {merged}")
          PY

  publish-winget-mock-ocr:
    name: Publish Winget Manifest (Mock OCR)
    if: needs.resolve-channel-scope.outputs.run_winget == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Mock publish
        shell: bash
        run: |
          set -euo pipefail
          echo "MOCK winget publish for squigit-ocr"
          echo "version=${{ needs.build-release-ocr.outputs.version }}"
          echo "asset_url=${{ needs.build-release-ocr.outputs.asset_url }}"
          echo "sha256=${{ needs.build-release-ocr.outputs.sha256 }}"

  test-winget-mock-ocr:
    name: End-user Winget Install Smoke (Mock OCR)
    if: needs.resolve-channel-scope.outputs.run_winget == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
      - publish-winget-mock-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Mock install smoke
        shell: bash
        run: |
          set -euo pipefail
          echo "MOCK winget install squigit-ocr --version ${{ needs.build-release-ocr.outputs.version }}"

  publish-apt-mock-ocr:
    name: Publish APT Package (Mock OCR)
    if: needs.resolve-channel-scope.outputs.run_apt == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Mock publish
        shell: bash
        run: |
          set -euo pipefail
          echo "MOCK apt publish for squigit-ocr"
          echo "version=${{ needs.build-release-ocr.outputs.version }}"
          echo "asset_url=${{ needs.build-release-ocr.outputs.asset_url }}"
          echo "sha256=${{ needs.build-release-ocr.outputs.sha256 }}"

  test-apt-mock-ocr:
    name: End-user APT Install Smoke (Mock OCR)
    if: needs.resolve-channel-scope.outputs.run_apt == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
      - publish-apt-mock-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Mock install smoke
        shell: bash
        run: |
          set -euo pipefail
          echo "MOCK apt install squigit-ocr=${{ needs.build-release-ocr.outputs.version }}"

  publish-dnf-mock-ocr:
    name: Publish DNF Package (Mock OCR)
    if: needs.resolve-channel-scope.outputs.run_dnf == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Mock publish
        shell: bash
        run: |
          set -euo pipefail
          echo "MOCK dnf publish for squigit-ocr"
          echo "version=${{ needs.build-release-ocr.outputs.version }}"
          echo "asset_url=${{ needs.build-release-ocr.outputs.asset_url }}"
          echo "sha256=${{ needs.build-release-ocr.outputs.sha256 }}"

  test-dnf-mock-ocr:
    name: End-user DNF Install Smoke (Mock OCR)
    if: needs.resolve-channel-scope.outputs.run_dnf == 'true'
    needs:
      - resolve-channel-scope
      - build-release-ocr
      - publish-dnf-mock-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Mock install smoke
        shell: bash
        run: |
          set -euo pipefail
          echo "MOCK dnf install squigit-ocr-${{ needs.build-release-ocr.outputs.version }}"
