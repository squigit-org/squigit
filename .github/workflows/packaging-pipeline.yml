name: Build and Package Standalone Sidecars

on:
  workflow_dispatch:

jobs:
  build-and-package:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: deb
          - os: macos-14
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: exe
            
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Sidecars via xtask
        run: cargo xtask build all --release
      
      # macOS Packaging (Homebrew Tarball)
      - name: Package macOS Tarballs
        if: runner.os == 'macOS'
        run: |
          tar -cvzf squigit-ocr-mac-aarch64.tar.gz -C target/release/binaries/paddle-ocr-${{ matrix.target }} .
          tar -cvzf squigit-stt-mac-aarch64.tar.gz -C target/release/binaries/whisper-stt-${{ matrix.target }} .
          
      # Linux Packaging (Debian & RPM)
      - name: Package Linux DEB and RPM
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y rpm
          
          # OCR DEB
          mkdir -p packaging/debian/squigit-ocr/usr/bin
          cp -r target/release/binaries/paddle-ocr-${{ matrix.target }}/* packaging/debian/squigit-ocr/usr/bin/
          dpkg-deb --build packaging/debian/squigit-ocr squigit-ocr_0.1.0_amd64.deb
          
          # STT DEB
          mkdir -p packaging/debian/squigit-stt/usr/bin
          cp -r target/release/binaries/whisper-stt-${{ matrix.target }}/* packaging/debian/squigit-stt/usr/bin/
          dpkg-deb --build packaging/debian/squigit-stt squigit-stt_0.1.0_amd64.deb
          
          # OCR RPM
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp -r target/release/binaries/paddle-ocr-${{ matrix.target }} rpmbuild/BUILD/squigit-ocr
          rpmbuild -bb --define "_topdir $PWD/rpmbuild" packaging/rpm/squigit-ocr.spec
          cp rpmbuild/RPMS/x86_64/*.rpm .
          
          # STT RPM
          cp -r target/release/binaries/whisper-stt-${{ matrix.target }} rpmbuild/BUILD/squigit-stt
          rpmbuild -bb --define "_topdir $PWD/rpmbuild" packaging/rpm/squigit-stt.spec
          cp rpmbuild/RPMS/x86_64/*.rpm .
          
      # Windows Packaging (InnoSetup)
      - name: Package Windows EXE
        if: runner.os == 'Windows'
        run: |
          iscc packaging\windows\squigit-ocr.iss
          iscc packaging\windows\squigit-stt.iss
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-sidecars-${{ runner.os }}
          path: |
            *.tar.gz
            *.deb
            *.rpm
            Output\setup_squigit-ocr.exe
            Output\setup_squigit-stt.exe
