name: "STT Release"

on:
  push:
    tags:
      - "stt-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "STT formula version (e.g.:0.2.0)"
        required: true
        type: string
      release_tag:
        description: "Optional release tag override (e.g.:stt-v0.2.0). Leave empty to auto-use stt-v<version>."
        required: false
        default: ""
        type: string
      release_homebrew:
        description: "Run Homebrew lane"
        required: false
        default: true
        type: boolean
      release_winget:
        description: "Run Winget lane"
        required: false
        default: true
        type: boolean
      submit_winget_pr:
        description: "Submit/update winget-pkgs PR"
        required: false
        default: false
        type: boolean
      release_apt:
        description: "Run APT lane"
        required: false
        default: true
        type: boolean
      release_dnf:
        description: "Run DNF lane"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  resolve-channel-scope:
    name: Resolve Channel Scope
    runs-on: ubuntu-latest
    outputs:
      run_homebrew: ${{ steps.scope.outputs.run_homebrew }}
      run_winget: ${{ steps.scope.outputs.run_winget }}
      run_apt: ${{ steps.scope.outputs.run_apt }}
      run_dnf: ${{ steps.scope.outputs.run_dnf }}
    steps:
      - name: Resolve channels
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            run_homebrew=true
            run_winget=true
            run_apt=true
            run_dnf=true
          else
            run_homebrew="${{ inputs.release_homebrew }}"
            run_winget="${{ inputs.release_winget }}"
            run_apt="${{ inputs.release_apt }}"
            run_dnf="${{ inputs.release_dnf }}"

            if [ "${run_homebrew}" != "true" ] && [ "${run_winget}" != "true" ] && [ "${run_apt}" != "true" ] && [ "${run_dnf}" != "true" ]; then
              echo "At least one channel must be enabled for workflow_dispatch."
              exit 1
            fi
          fi

          echo "run_homebrew=${run_homebrew}" >> "$GITHUB_OUTPUT"
          echo "run_winget=${run_winget}" >> "$GITHUB_OUTPUT"
          echo "run_apt=${run_apt}" >> "$GITHUB_OUTPUT"
          echo "run_dnf=${run_dnf}" >> "$GITHUB_OUTPUT"
          echo "Resolved channels: homebrew=${run_homebrew}, winget=${run_winget}, apt=${run_apt}, dnf=${run_dnf}"

  resolve-release-meta:
    name: Resolve Release Metadata
    needs: resolve-channel-scope
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - name: Resolve version and release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            RELEASE_TAG="${{ inputs.release_tag }}"
            if [ -z "${RELEASE_TAG}" ]; then
              RELEASE_TAG="stt-v${VERSION}"
            fi
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            VERSION="${RELEASE_TAG#stt-v}"
          fi

          if [ -z "${VERSION}" ]; then
            echo "Resolved VERSION is empty"
            exit 1
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "Resolved RELEASE_TAG is empty"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release metadata: tag=${RELEASE_TAG}, version=${VERSION}"

  build-release-stt:
    name: Build STT macOS Arm64 + Release Asset
    if: needs.resolve-channel-scope.outputs.run_homebrew == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
    runs-on: macos-14
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      asset_url: ${{ steps.meta.outputs.asset_url }}
      sha256: ${{ steps.meta.outputs.sha256 }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Whisper STT Sidecar
        uses: ./.github/actions/build-whisper-stt
        with:
          python-version: "3.12"

      - name: Run Sidecar Version Smoke Check
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.resolve-release-meta.outputs.version }}
        run: |
          set -euo pipefail
          chmod +x packaging/binaries/whisper-stt-aarch64-apple-darwin/squigit-stt || true
          STT_VERSION="$(packaging/binaries/whisper-stt-aarch64-apple-darwin/squigit-stt --version | tr -d '\r' | tail -n 1)"
          echo "Detected STT version: ${STT_VERSION}"
          if ! [[ "${STT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid STT version output: ${STT_VERSION}"
            exit 1
          fi
          if [ "${STT_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "STT version mismatch: built=${STT_VERSION}, expected=${EXPECTED_VERSION}"
            echo "Align sidecar --version with the release version/tag before publishing."
            exit 1
          fi

      - name: Create Release Tarball
        shell: bash
        run: |
          set -euo pipefail
          tar -czvf squigit-stt-mac-aarch64.tar.gz -C packaging/binaries/whisper-stt-aarch64-apple-darwin .

      - name: Upload STT Asset to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-release-meta.outputs.release_tag }}
          name: STT v${{ needs.resolve-release-meta.outputs.version }}
          files: squigit-stt-mac-aarch64.tar.gz
          overwrite_files: true
          repository: squigit-org/squigit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Release Metadata
        id: meta
        shell: bash
        env:
          VERSION: ${{ needs.resolve-release-meta.outputs.version }}
          RELEASE_TAG: ${{ needs.resolve-release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          SHA256="$(shasum -a 256 squigit-stt-mac-aarch64.tar.gz | awk '{ print $1 }')"
          ASSET_URL="https://github.com/squigit-org/squigit/releases/download/${RELEASE_TAG}/squigit-stt-mac-aarch64.tar.gz"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"

  build-release-stt-windows:
    name: Build STT Windows x64 + Release Asset
    if: needs.resolve-channel-scope.outputs.run_winget == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
    runs-on: windows-latest
    outputs:
      version: ${{ needs.resolve-release-meta.outputs.version }}
      release_tag: ${{ needs.resolve-release-meta.outputs.release_tag }}
      asset_url: ${{ steps.meta.outputs.asset_url }}
      sha256: ${{ steps.meta.outputs.sha256 }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Whisper STT Sidecar (Windows x64)
        id: build
        uses: ./.github/actions/build-whisper-stt
        with:
          python-version: "3.12"
          package-windows-asset: "true"
          windows-asset-name: "squigit-stt-win-x64.zip"

      - name: Run STT Version Smoke Check (Windows)
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ needs.resolve-release-meta.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $sttVersion = & packaging/binaries/whisper-stt-x86_64-pc-windows-msvc/squigit-stt.exe --version
          $sttVersion = ($sttVersion | Select-Object -Last 1).Trim()
          Write-Host "Detected STT version: $sttVersion"
          if ($sttVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid STT version output: $sttVersion"
          }
          if ($sttVersion -ne $env:EXPECTED_VERSION) {
            throw "STT version mismatch: built=$sttVersion expected=$env:EXPECTED_VERSION"
          }

      - name: Upload STT Windows Asset to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-release-meta.outputs.release_tag }}
          name: STT v${{ needs.resolve-release-meta.outputs.version }}
          files: ${{ steps.build.outputs.asset-path }}
          overwrite_files: true
          repository: squigit-org/squigit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Winget Release Metadata
        id: meta
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.resolve-release-meta.outputs.release_tag }}
          ASSET_NAME: ${{ steps.build.outputs.asset-name }}
          ASSET_SHA256: ${{ steps.build.outputs.asset-sha256 }}
        run: |
          $ErrorActionPreference = "Stop"
          $assetUrl = "https://github.com/squigit-org/squigit/releases/download/$env:RELEASE_TAG/$env:ASSET_NAME"
          "asset_url=$assetUrl" >> $env:GITHUB_OUTPUT
          "sha256=$env:ASSET_SHA256" >> $env:GITHUB_OUTPUT

  build-release-stt-linux:
    name: Build STT Linux x64 + Release Package Assets
    if: needs.resolve-channel-scope.outputs.run_apt == 'true' || needs.resolve-channel-scope.outputs.run_dnf == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.resolve-release-meta.outputs.version }}
      release_tag: ${{ needs.resolve-release-meta.outputs.release_tag }}
      deb_name: ${{ steps.pkg.outputs.deb_name }}
      deb_sha256: ${{ steps.pkg.outputs.deb_sha256 }}
      deb_asset_url: ${{ steps.meta.outputs.deb_asset_url }}
      rpm_name: ${{ steps.pkg.outputs.rpm_name }}
      rpm_sha256: ${{ steps.pkg.outputs.rpm_sha256 }}
      rpm_asset_url: ${{ steps.meta.outputs.rpm_asset_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Packaging Toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm createrepo-c dpkg-dev apt-utils

      - name: Build Whisper STT Sidecar (Linux x64)
        uses: ./.github/actions/build-whisper-stt
        with:
          python-version: "3.12"

      - name: Validate STT Runtime Layout
        shell: bash
        run: |
          set -euo pipefail
          test -x packaging/binaries/whisper-stt-x86_64-unknown-linux-gnu/squigit-stt
          test -f packaging/binaries/whisper-stt-x86_64-unknown-linux-gnu/_internal/models/ggml-tiny.en.bin

      - name: Build Linux Package Files (.deb/.rpm)
        id: pkg
        uses: ./.github/actions/build-linux-packages
        with:
          package-name: squigit-stt
          package-version: ${{ needs.resolve-release-meta.outputs.version }}
          runtime-dir: packaging/binaries/whisper-stt-x86_64-unknown-linux-gnu
          binary-name: squigit-stt
          deb-control-template: ${{ github.workspace }}/packaging/debian/squigit-stt/DEBIAN/control
          rpm-spec-template: ${{ github.workspace }}/packaging/rpm/squigit-stt.spec
          summary: Standalone CLI STT engine for Squigit
          description-line-1: A headless, offline speech to text whisper-based engine designed for Squigit.
          description-line-2: Includes local runtime libraries and the ggml-tiny.en.bin model for Linux x86_64.

      - name: Upload Linux Package Assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-release-meta.outputs.release_tag }}
          name: STT v${{ needs.resolve-release-meta.outputs.version }}
          files: |
            ${{ steps.pkg.outputs.deb_path }}
            ${{ steps.pkg.outputs.rpm_path }}
          overwrite_files: true
          repository: squigit-org/squigit
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Linux Release Metadata
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve-release-meta.outputs.release_tag }}
          DEB_NAME: ${{ steps.pkg.outputs.deb_name }}
          RPM_NAME: ${{ steps.pkg.outputs.rpm_name }}
        run: |
          set -euo pipefail
          echo "deb_asset_url=https://github.com/squigit-org/squigit/releases/download/${RELEASE_TAG}/${DEB_NAME}" >> "$GITHUB_OUTPUT"
          echo "rpm_asset_url=https://github.com/squigit-org/squigit/releases/download/${RELEASE_TAG}/${RPM_NAME}" >> "$GITHUB_OUTPUT"

  build-phase-complete:
    name: Build Phase Complete
    if: always()
    needs:
      - resolve-channel-scope
      - build-release-stt
      - build-release-stt-windows
      - build-release-stt-linux
    runs-on: ubuntu-latest
    steps:
      - name: Validate selected build results
        shell: bash
        env:
          RUN_HOMEBREW: ${{ needs.resolve-channel-scope.outputs.run_homebrew }}
          RUN_WINGET: ${{ needs.resolve-channel-scope.outputs.run_winget }}
          RUN_APT: ${{ needs.resolve-channel-scope.outputs.run_apt }}
          RUN_DNF: ${{ needs.resolve-channel-scope.outputs.run_dnf }}
          MAC_RESULT: ${{ needs.build-release-stt.result }}
          WIN_RESULT: ${{ needs.build-release-stt-windows.result }}
          LINUX_RESULT: ${{ needs.build-release-stt-linux.result }}
        run: |
          set -euo pipefail

          failed=0

          if [ "${RUN_HOMEBREW}" = "true" ] && [ "${MAC_RESULT}" != "success" ]; then
            echo "Homebrew lane selected, but macOS build result is '${MAC_RESULT}'." >&2
            failed=1
          fi

          if [ "${RUN_WINGET}" = "true" ] && [ "${WIN_RESULT}" != "success" ]; then
            echo "Winget lane selected, but Windows build result is '${WIN_RESULT}'." >&2
            failed=1
          fi

          if { [ "${RUN_APT}" = "true" ] || [ "${RUN_DNF}" = "true" ]; } && [ "${LINUX_RESULT}" != "success" ]; then
            echo "APT/DNF lane selected, but Linux build result is '${LINUX_RESULT}'." >&2
            failed=1
          fi

          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi

          echo "Selected STT builds completed successfully."

  publish-linux-packages-stt:
    name: Publish Signed Linux Package Metadata (STT)
    if: always() && (needs.resolve-channel-scope.outputs.run_apt == 'true' || needs.resolve-channel-scope.outputs.run_dnf == 'true')
    needs:
      - resolve-channel-scope
      - resolve-release-meta
      - build-phase-complete
      - build-release-stt-linux
    runs-on: ubuntu-latest
    concurrency:
      group: squigit-packages-publish
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Metadata Publishing Toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rpm createrepo-c dpkg-dev apt-utils gnupg2

      - name: Download Linux Package Assets
        id: assets
        shell: bash
        env:
          DEB_ASSET_URL: ${{ needs.build-release-stt-linux.outputs.deb_asset_url }}
          DEB_NAME: ${{ needs.build-release-stt-linux.outputs.deb_name }}
          DEB_SHA256: ${{ needs.build-release-stt-linux.outputs.deb_sha256 }}
          RPM_ASSET_URL: ${{ needs.build-release-stt-linux.outputs.rpm_asset_url }}
          RPM_NAME: ${{ needs.build-release-stt-linux.outputs.rpm_name }}
          RPM_SHA256: ${{ needs.build-release-stt-linux.outputs.rpm_sha256 }}
        run: |
          set -euo pipefail

          asset_dir="${RUNNER_TEMP}/linux-release-assets"
          rm -rf "${asset_dir}"
          mkdir -p "${asset_dir}"

          for entry in \
            "${DEB_ASSET_URL}|${DEB_NAME}" \
            "${RPM_ASSET_URL}|${RPM_NAME}"; do
            url="${entry%%|*}"
            name="${entry##*|}"
            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error --location --head --max-time 30 "${url}" >/dev/null; then
                break
              fi
              if [ "${attempt}" -eq 12 ]; then
                echo "Release asset did not propagate in time: ${url}" >&2
                exit 1
              fi
              sleep 10
            done
            curl --fail --silent --show-error --location "${url}" -o "${asset_dir}/${name}"
          done

          echo "${DEB_SHA256}  ${asset_dir}/${DEB_NAME}" | sha256sum -c -
          echo "${RPM_SHA256}  ${asset_dir}/${RPM_NAME}" | sha256sum -c -

          echo "deb_path=${asset_dir}/${DEB_NAME}" >> "$GITHUB_OUTPUT"
          echo "rpm_path=${asset_dir}/${RPM_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish Signed APT/DNF Metadata
        uses: ./.github/actions/publish-linux-packages-repo
        with:
          packages-token: ${{ secrets.PACKAGES_GITHUB_TOKEN }}
          packages-repo: squigit-org/squigit-packages
          package-name: squigit-stt
          package-component: stt
          package-version: ${{ needs.resolve-release-meta.outputs.version }}
          deb-path: ${{ steps.assets.outputs.deb_path }}
          rpm-path: ${{ steps.assets.outputs.rpm_path }}
          gpg-private-key: ${{ secrets.LINUX_PACKAGES_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.LINUX_PACKAGES_GPG_PASSPHRASE }}
          pages-base-url: https://squigit-org.github.io/squigit-packages
          apt-suite: stable

  test-apt-stt:
    name: End-user APT Install Smoke (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_apt == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
      - publish-linux-packages-stt
    runs-on: ubuntu-latest
    steps:
      - name: Configure Squigit APT Repository
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://squigit-org.github.io/squigit-packages/keys/squigit-packages.asc | gpg --dearmor | sudo tee /etc/apt/keyrings/squigit-packages.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/keyrings/squigit-packages.gpg] https://squigit-org.github.io/squigit-packages/apt stable ocr stt" | sudo tee /etc/apt/sources.list.d/squigit-packages.list >/dev/null

      - name: Refresh APT Cache (with retries)
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if sudo apt-get update && apt-cache policy squigit-stt | awk '/Candidate:/ {print $2}' | grep -vq '(none)'; then
              exit 0
            fi
            if [ "${attempt}" -eq 12 ]; then
              echo "APT metadata did not propagate in time for squigit-stt" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Install squigit-stt
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y squigit-stt

      - name: Validate Installed STT Version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.resolve-release-meta.outputs.version }}
        run: |
          set -euo pipefail
          STT_VERSION="$(squigit-stt --version | tr -d '\r' | tail -n 1)"
          echo "Installed STT version: ${STT_VERSION}"
          if ! [[ "${STT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Installed STT version is not semver: ${STT_VERSION}"
            exit 1
          fi
          if [ "${STT_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "Installed STT version mismatch: installed=${STT_VERSION}, expected=${EXPECTED_VERSION}"
            exit 1
          fi
          test -f /usr/lib/squigit-stt/_internal/models/ggml-tiny.en.bin

  test-dnf-stt:
    name: End-user DNF Install Smoke (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_dnf == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
      - publish-linux-packages-stt
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install DNF Test Dependencies
        shell: bash
        run: |
          set -euo pipefail
          dnf install -y ca-certificates curl dnf-plugins-core gnupg2

      - name: Configure Squigit DNF Repository
        shell: bash
        run: |
          set -euo pipefail
          cat > /etc/yum.repos.d/squigit.repo <<'EOF'
          [squigit-ocr]
          name=Squigit OCR Packages
          baseurl=https://squigit-org.github.io/squigit-packages/rpm/ocr
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://squigit-org.github.io/squigit-packages/keys/squigit-packages.asc

          [squigit-stt]
          name=Squigit STT Packages
          baseurl=https://squigit-org.github.io/squigit-packages/rpm/stt
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://squigit-org.github.io/squigit-packages/keys/squigit-packages.asc
          EOF

      - name: Refresh DNF Cache (with retries)
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if dnf makecache --refresh; then
              exit 0
            fi
            if [ "${attempt}" -eq 12 ]; then
              echo "DNF metadata did not propagate in time for squigit-stt" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Install squigit-stt
        shell: bash
        run: |
          set -euo pipefail
          dnf install -y squigit-stt

      - name: Validate Installed STT Version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.resolve-release-meta.outputs.version }}
        run: |
          set -euo pipefail
          STT_VERSION="$(squigit-stt --version | tr -d '\r' | tail -n 1)"
          echo "Installed STT version: ${STT_VERSION}"
          if ! [[ "${STT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Installed STT version is not semver: ${STT_VERSION}"
            exit 1
          fi
          if [ "${STT_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "Installed STT version mismatch: installed=${STT_VERSION}, expected=${EXPECTED_VERSION}"
            exit 1
          fi
          test -f /usr/lib/squigit-stt/_internal/models/ggml-tiny.en.bin

  update-homebrew-tap-stt:
    name: Update Homebrew Tap Formula (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_homebrew == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
      - build-phase-complete
      - build-release-stt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Sync STT Formula to Tap
        uses: ./.github/actions/update-homebrew-tap-formula
        with:
          tap-token: ${{ secrets.TAP_GITHUB_TOKEN }}
          tap-repo: squigit-org/homebrew-tap
          version: ${{ needs.resolve-release-meta.outputs.version }}
          asset-url: ${{ needs.build-release-stt.outputs.asset_url }}
          sha256: ${{ needs.build-release-stt.outputs.sha256 }}
          template-formula-path: ${{ github.workspace }}/packaging/homebrew/squigit-stt.rb
          formula-file: squigit-stt.rb
          commit-message: Update squigit-stt to v${{ needs.resolve-release-meta.outputs.version }}

  test-homebrew-stt:
    name: End-user Homebrew Install Smoke (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_homebrew == 'true'
    needs:
      - resolve-channel-scope
      - resolve-release-meta
      - build-phase-complete
      - update-homebrew-tap-stt
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Tap and Install squigit-stt
        uses: ./.github/actions/homebrew-install-with-retry
        with:
          tap: squigit-org/tap
          formula: squigit-stt
          initial-wait-seconds: "60"
          attempts: "6"
          sleep-seconds: "20"
          brew-curl-retries: "5"

      - name: Run Built-in Formula Test
        shell: bash
        run: brew test squigit-stt

      - name: Validate Installed STT Version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.resolve-release-meta.outputs.version }}
        run: |
          set -euo pipefail
          STT_VERSION="$(squigit-stt --version | tr -d '\r' | tail -n 1)"
          echo "Installed STT version: ${STT_VERSION}"
          if ! [[ "${STT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Installed STT version is not semver: ${STT_VERSION}"
            exit 1
          fi
          if [ "${STT_VERSION}" != "${EXPECTED_VERSION}" ]; then
            echo "Installed STT version mismatch: installed=${STT_VERSION}, expected=${EXPECTED_VERSION}"
            exit 1
          fi

  publish-winget-stt:
    name: Publish Winget Manifest (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_winget == 'true'
    needs:
      - resolve-channel-scope
      - build-phase-complete
      - build-release-stt-windows
      - validate-winget-manifest-stt
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate Winget Manifest (STT)
        id: manifest
        uses: ./.github/actions/generate-winget-portable-manifest
        with:
          package-identifier: SquigitOrg.SquigitSTT
          package-version: ${{ needs.build-release-stt-windows.outputs.version }}
          package-name: Squigit STT
          publisher: Squigit Org
          short-description: Standalone headless speech-to-text CLI engine for Squigit
          installer-url: ${{ needs.build-release-stt-windows.outputs.asset_url }}
          installer-sha256: ${{ needs.build-release-stt-windows.outputs.sha256 }}
          command-alias: squigit-stt
          nested-installer-path: squigit-stt.exe
          output-dir: ${{ github.workspace }}/target/winget-manifest-stt

      - name: Upload Winget Manifest (STT)
        uses: actions/upload-artifact@v7
        with:
          name: winget-manifest-stt
          path: ${{ steps.manifest.outputs.manifest-dir }}

      - name: Submit Winget Update PR (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.submit_winget_pr
        shell: pwsh
        env:
          PACKAGE_IDENTIFIER: SquigitOrg.SquigitSTT
          PACKAGE_VERSION: ${{ needs.build-release-stt-windows.outputs.version }}
          INSTALLER_URL: ${{ needs.build-release-stt-windows.outputs.asset_url }}
          MANIFEST_DIR: ${{ steps.manifest.outputs.manifest-dir }}
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            Write-Host "WINGET_CREATE_GITHUB_TOKEN is empty; skipping wingetcreate --submit."
            exit 0
          }

          $packageRoot = ($env:PACKAGE_IDENTIFIER -replace '\.', '/')
          $manifestApiPath = "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/$($env:PACKAGE_IDENTIFIER.Substring(0, 1).ToLowerInvariant())/$packageRoot"
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "squigit-github-actions"
          }

          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          $manifestLookup = Invoke-WebRequest -Uri $manifestApiPath -Headers $headers -SkipHttpErrorCheck

          if ($manifestLookup.StatusCode -eq 404) {
            Write-Host "No existing winget-pkgs manifest found for $env:PACKAGE_IDENTIFIER. Submitting generated manifest as first publication."
            .\wingetcreate.exe submit $env:MANIFEST_DIR
          } elseif ($manifestLookup.StatusCode -eq 200) {
            Write-Host "Existing winget-pkgs manifest found for $env:PACKAGE_IDENTIFIER. Submitting update."
            .\wingetcreate.exe update $env:PACKAGE_IDENTIFIER -u $env:INSTALLER_URL -v $env:PACKAGE_VERSION --submit
          } else {
            throw "Unexpected response while checking winget-pkgs manifest path ($($manifestLookup.StatusCode)): $manifestApiPath"
          }

      - name: Publish Notes
        shell: pwsh
        run: |
          Write-Host "Prepared Winget manifest for squigit-stt"
          Write-Host "version=${{ needs.build-release-stt-windows.outputs.version }}"
          Write-Host "asset_url=${{ needs.build-release-stt-windows.outputs.asset_url }}"
          Write-Host "sha256=${{ needs.build-release-stt-windows.outputs.sha256 }}"
          Write-Host "Set submit_winget_pr=true on workflow_dispatch and configure WINGET_CREATE_GITHUB_TOKEN to open/update winget-pkgs PRs."
          Write-Host "This workflow auto-detects first publication vs update and will submit the generated manifest accordingly."

  validate-winget-manifest-stt:
    name: Validate Winget Manifest (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_winget == 'true'
    needs:
      - resolve-channel-scope
      - build-phase-complete
      - build-release-stt-windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Generate Winget Manifest (STT Validate)
        id: manifest
        uses: ./.github/actions/generate-winget-portable-manifest
        with:
          package-identifier: SquigitOrg.SquigitSTT
          package-version: ${{ needs.build-release-stt-windows.outputs.version }}
          package-name: Squigit STT
          publisher: Squigit Org
          short-description: Standalone headless speech-to-text CLI engine for Squigit
          installer-url: ${{ needs.build-release-stt-windows.outputs.asset_url }}
          installer-sha256: ${{ needs.build-release-stt-windows.outputs.sha256 }}
          command-alias: squigit-stt
          nested-installer-path: squigit-stt.exe
          output-dir: ${{ github.workspace }}/target/winget-manifest-stt-validate

      - name: Validate Manifest with Winget CLI (STT)
        shell: pwsh
        env:
          MANIFEST_DIR: ${{ steps.manifest.outputs.manifest-dir }}
        run: |
          $ErrorActionPreference = "Stop"
          winget --version

          $help = winget --help | Out-String
          if ($help -notmatch "(?m)^\s*validate\s") {
            throw "winget validate command is unavailable on this runner image."
          }

          & winget validate --manifest "$env:MANIFEST_DIR" --verbose
          if ($LASTEXITCODE -ne 0) {
            throw "winget validate failed with exit code $LASTEXITCODE"
          }

  test-winget-stt:
    name: End-user Winget Install Smoke (STT)
    if: always() && needs.resolve-channel-scope.outputs.run_winget == 'true'
    needs:
      - resolve-channel-scope
      - build-phase-complete
      - build-release-stt-windows
      - publish-winget-stt
      - validate-winget-manifest-stt
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install via Winget (STT)
        id: install-winget
        shell: pwsh
        env:
          PACKAGE_ID: SquigitOrg.SquigitSTT
          ASSET_URL: ${{ needs.build-release-stt-windows.outputs.asset_url }}
        run: |
          $ErrorActionPreference = "Continue"

          winget uninstall --id $env:PACKAGE_ID --scope user --silent --disable-interactivity --accept-source-agreements
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous $env:PACKAGE_ID install found (winget uninstall exit code: $LASTEXITCODE)."
          }

          # True end-user path: install from public Winget source by package ID.
          winget install --id $env:PACKAGE_ID --exact --source winget --scope user --silent --disable-interactivity --accept-source-agreements --accept-package-agreements
          if ($LASTEXITCODE -eq 0) {
            "install_mode=winget-source" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "Public source install failed (exit code: $LASTEXITCODE). Falling back to direct asset extraction for pre-publication CI."
          $fallbackDir = Join-Path $env:RUNNER_TEMP "squigit-stt-fallback"
          if (Test-Path -LiteralPath $fallbackDir) {
            Remove-Item -LiteralPath $fallbackDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $fallbackDir -Force | Out-Null
          $zipPath = Join-Path $fallbackDir "squigit-stt-win-x64.zip"
          Invoke-WebRequest $env:ASSET_URL -OutFile $zipPath -ErrorAction Stop
          Expand-Archive -LiteralPath $zipPath -DestinationPath $fallbackDir -Force -ErrorAction Stop

          $fallbackExe = Join-Path $fallbackDir "squigit-stt.exe"
          if (-not (Test-Path -LiteralPath $fallbackExe)) {
            throw "Fallback STT executable not found after extraction: $fallbackExe"
          }

          "install_mode=fallback-zip" >> $env:GITHUB_OUTPUT
          "fallback_exe=$fallbackExe" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Resolve Installed STT Executable
        id: locate-stt
        shell: pwsh
        env:
          FALLBACK_EXE: ${{ steps.install-winget.outputs.fallback_exe }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:FALLBACK_EXE)) {
            "stt_exe=$env:FALLBACK_EXE" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $cmd = Get-Command squigit-stt -ErrorAction SilentlyContinue
          if ($cmd) {
            $sttExe = $cmd.Source
          } else {
            $root = Join-Path $env:LOCALAPPDATA "Microsoft\WinGet\Packages"
            $candidate = Get-ChildItem -Path $root -Recurse -Filter squigit-stt.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $candidate) {
              throw "Installed squigit-stt executable was not found."
            }
            $sttExe = $candidate.FullName
          }
          "stt_exe=$sttExe" >> $env:GITHUB_OUTPUT

      - name: Validate Installed STT Version
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ needs.build-release-stt-windows.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $sttVersion = & "${{ steps.locate-stt.outputs.stt_exe }}" --version
          $sttVersion = ($sttVersion | Select-Object -Last 1).Trim()
          Write-Host "Installed STT version: $sttVersion"
          if ($sttVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Installed STT version is not semver: $sttVersion"
          }
          if ($sttVersion -ne $env:EXPECTED_VERSION) {
            throw "Installed STT version mismatch: installed=$sttVersion expected=$env:EXPECTED_VERSION"
          }
