name: "OCR macOS Sidecar Smoke"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/actions/build-ocr-engine/**"
      - ".github/workflows/ocr-macos-sidecar-smoke.yml"
      - "sidecars/paddle-ocr/**"
      - "xtask/**"

jobs:
  build-and-smoke-macos:
    name: Build + CLI smoke (macOS ARM)
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Build OCR sidecar
        uses: ./.github/actions/build-ocr-engine
        with:
          python-version: "3.12"
          pyi-mode: "onedir"

      - name: Locate packaged sidecar path
        id: sidecar
        shell: bash
        run: |
          set -euo pipefail
          runtime_dir="$(find app/binaries -maxdepth 1 -type d -name 'paddle-ocr-*' | head -n 1)"
          if [[ -z "${runtime_dir}" ]]; then
            echo "No packaged OCR runtime directory found under app/binaries"
            ls -la app/binaries || true
            exit 1
          fi

          sidecar_bin="${runtime_dir}/ocr-engine"
          if [[ ! -x "${sidecar_bin}" ]]; then
            echo "OCR sidecar executable not found: ${sidecar_bin}"
            ls -la "${runtime_dir}" || true
            exit 1
          fi

          echo "runtime_dir=${runtime_dir}" >> "${GITHUB_OUTPUT}"
          echo "sidecar_bin=${sidecar_bin}" >> "${GITHUB_OUTPUT}"

      - name: Generate PNG smoke image
        shell: bash
        run: |
          set -euo pipefail
          sidecars/paddle-ocr/venv/bin/python sidecars/paddle-ocr/scripts/gen_test_image.py \
            --output /tmp/ocr-smoke-macos.png \
            --text "SNAPLLM MACOS OCR SMOKE"

      - name: Run sidecar CLI and print JSON
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.sidecar.outputs.sidecar_bin }}" /tmp/ocr-smoke-macos.png | tee /tmp/ocr-smoke-output.json

      - name: Validate OCR JSON payload
        shell: bash
        run: |
          set -euo pipefail
          sidecars/paddle-ocr/venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          out = Path("/tmp/ocr-smoke-output.json")
          payload = json.loads(out.read_text(encoding="utf-8").strip())
          if isinstance(payload, dict) and "error" in payload:
              raise SystemExit(f"OCR returned error: {payload['error']}")
          if not isinstance(payload, list):
              raise SystemExit(f"OCR payload type {type(payload).__name__}, expected list")
          if not payload:
              raise SystemExit("OCR payload list is empty")

          text_values = [str(item.get("text", "")).strip() for item in payload if isinstance(item, dict)]
          merged = " | ".join(t for t in text_values if t)
          print(f"Detected entries: {len(payload)}")
          print(f"Detected text: {merged}")
          PY

      - name: Upload macOS OCR smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ocr-macos-smoke-artifacts
          path: |
            /tmp/ocr-smoke-macos.png
            /tmp/ocr-smoke-output.json
