schema = 2

[context]
kind = "component"
name = "renderer"
display_name = "Renderer"
category = "apps"
order = 20
archived = false

[requirements]
node = true
rust = false
python = false
cmake = false
qt = false

[version]
scheme = "calver"
files = ["package.json", "CHANGELOG.md"]
include_root = false
source = { path = "package.json", format = "json", key = "version" }

[release]
tag = "renderer-v{version}"

[tests]
root = "tests"
include = ["tests/*.test.ts", "tests/**/*.test.ts", "tests/*.test.tsx", "tests/**/*.test.tsx"]

[operations]
setup = { enabled = true, handler = "setup", description = "Set up Renderer toolchains" }
dev = { enabled = true, handler = "node-app", description = "Start Renderer locally" }
doctor = { enabled = true, handler = "node-app", description = "Check Renderer type safety" }
build = { enabled = true, handler = "node-app", requires_commit_sha = false, description = "Build the Renderer package" }
test = { enabled = true, handler = "node-app", description = "Run Renderer test suites" }
clean = { enabled = true, handler = "node-app", description = "Remove build artifacts" }
bump = { enabled = true, handler = "node-app", description = "Prepare a CalVer update" }
release = { enabled = true, handler = "renderer-release", description = "Prepare the Renderer release" }

[ui.menu]
title = "Renderer xtask"
usage = "cargo xtask <command> [options]"

[ui.setup]
title = "Renderer Setup"
checking = "Checking required toolchains:"
install_notice = "Xtask will install missing tools required by Renderer."
empty_notice = "No additional tools are required."
prompt = "Continue? [y/N]"
declined = "Setup cancelled."
