schema = 2

[context]
kind = "component"
name = "cli"
display_name = "CLI"
category = "apps"
order = 10
archived = false

[requirements]
node = true
rust = false
python = false
cmake = false
qt = false

[version]
scheme = "semver"
files = ["package.json", "package-lock.json"]
include_root = true
source = { path = "package.json", format = "json", key = "version" }

[release]
tag = "cli-v{version}"

[tests]
root = "tests"
include = ["tests/*.test.ts", "tests/**/*.test.ts"]

[operations]
setup = { enabled = true, handler = "setup", description = "Set up CLI toolchains" }
dev = { enabled = true, handler = "node-app", description = "Start the CLI locally" }
doctor = { enabled = true, handler = "node-app", description = "Check CLI type safety" }
build = { enabled = true, handler = "node-app", requires_commit_sha = false, description = "Build the CLI package" }
test = { enabled = true, handler = "node-app", description = "Run CLI test suites" }
clean = { enabled = true, handler = "node-app", description = "Remove build artifacts" }
bump = { enabled = true, handler = "node-app", description = "Prepare a SemVer update" }
release = { enabled = true, handler = "cli-release", description = "Prepare the CLI release" }

[ui.menu]
title = "CLI xtask"
usage = "cargo xtask <command> [options]"

[ui.setup]
title = "CLI Setup"
checking = "Checking required toolchains:"
install_notice = "Xtask will install missing tools required by CLI."
empty_notice = "No additional tools are required."
prompt = "Continue? [y/N]"
declined = "Setup cancelled."
